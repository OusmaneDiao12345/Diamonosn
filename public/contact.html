<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - DiamanoSN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #0d9488;
      --green2: #115e59;
      --gray: #64748b;
      --gray3: #cbd5e1;
      --gray4: #e2e8f0;
      --gray5: #f8fafc;
      --dark: #0f172a;
      --dark2: #1e293b;
      --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray5);
      color: var(--dark);
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gray4);
      color: var(--dark);
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 30px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: var(--gray3); }
    .header {
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: white;
      padding: 40px 20px;
      border-radius: 16px;
      margin-bottom: 40px;
      text-align: center;
    }
    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .header p {
      font-size: 16px;
      opacity: 0.9;
    }
    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }
    .contact-info {
      background: white;
      padding: 30px;
      border-radius: var(--r);
      border: 2px solid var(--gray4);
    }
    .info-item {
      margin-bottom: 30px;
      display: flex;
      gap: 16px;
    }
    .info-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .info-content h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .info-content p {
      font-size: 14px;
      color: var(--gray);
    }
    .contact-form {
      background: white;
      padding: 30px;
      border-radius: var(--r);
      border: 2px solid var(--gray4);
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--dark);
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--gray4);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--dark);
      transition: all 0.2s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 120px;
    }
    button {
      width: 100%;
      background: var(--green);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    button:hover {
      background: var(--green2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
    }
    button:disabled {
      background: var(--gray3);
      cursor: not-allowed;
      transform: none;
    }
    .message {
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      text-align: center;
      display: none;
      font-weight: 600;
    }
    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 2px solid #86efac;
    }
    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 2px solid #fca5a5;
    }
    @media (max-width: 768px) {
      .content-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="window.history.back()">← Retour</button>
    
    <div class="header">
      <h1>📧 Nous Contacter</h1>
      <p>Votre message est important pour nous. Nous répondons dans les 24h.</p>
    </div>

    <div class="content-grid">
      <div class="contact-info">
        <div class="info-item">
          <div class="info-icon">📍</div>
          <div class="info-content">
            <h3>Adresse</h3>
            <p>Dakar, Sénégal</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">📞</div>
          <div class="info-content">
            <h3>Téléphone</h3>
            <p>+221 77 XXX XXXX</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">✉️</div>
          <div class="info-content">
            <h3>Email</h3>
            <p>contact@diamanosn.com</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">🕐</div>
          <div class="info-content">
            <h3>Horaires</h3>
            <p>Lun-Ven: 9h-18h<br>Sam-Dim: 10h-16h</p>
          </div>
        </div>

        <div class="info-item">
          <div class="info-icon">⏱️</div>
          <div class="info-content">
            <h3>Temps de réponse</h3>
            <p>Nous répondons généralement dans les 24 heures</p>
          </div>
        </div>
      </div>

      <div class="contact-form">
        <div id="statusMessage" class="message"></div>
        
        <form id="contactForm" onsubmit="submitForm(event)">
          <div class="form-group">
            <label for="name">Nom complet</label>
            <input type="text" id="name" name="name" required placeholder="Votre nom">
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="votre@email.com">
          </div>

          <div class="form-group">
            <label for="phone">Téléphone (optionnel)</label>
            <input type="tel" id="phone" name="phone" placeholder="+221 77 XXX XXXX">
          </div>

          <div class="form-group">
            <label for="subject">Sujet</label>
            <input type="text" id="subject" name="subject" required placeholder="Objet de votre demande">
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required placeholder="Décrivez votre demande..."></textarea>
          </div>

          <button type="submit" id="submitBtn">✉️ Envoyer le message</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    async function submitForm(event) {
      event.preventDefault();

      const form = document.getElementById('contactForm');
      const btn = document.getElementById('submitBtn');
      const msgDiv = document.getElementById('statusMessage');

      btn.disabled = true;
      btn.textContent = '⏳ Envoi...';

      try {
        const formData = {
          name: document.getElementById('name').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          subject: document.getElementById('subject').value,
          message: document.getElementById('message').value
        };

        const response = await fetch('https://diamonobackend.onrender.com/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          msgDiv.className = 'message success';
          msgDiv.textContent = '✅ Message envoyé avec succès! Nous vous répondrons dans les 24h.';
          form.reset();
        } else {
          throw new Error('Erreur lors de l\'envoi');
        }
      } catch (error) {
        msgDiv.className = 'message error';
        msgDiv.textContent = '❌ Erreur lors de l\'envoi. Veuillez réessayer.';
      } finally {
        btn.disabled = false;
        btn.textContent = '✉️ Envoyer le message';
      }
    }
  </script>
</body>
</html>
