<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Commandes - DiamanoSN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .order-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .order-id { font-weight: bold; color: #667eea; }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: 600; }
        .badge-pending { background: #fed7d7; color: #c53030; }
        .badge-confirmed { background: #c6f6d5; color: #22543d; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; }
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; max-width: 500px; width: 90%; }
        select, textarea { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 Gestion des Commandes</h1>
        <button class="btn btn-primary" onclick="location.href='/admin-advanced.html'">← Retour au Dashboard</button>
    </div>

    <div class="container">
        <div id="ordersContainer"></div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <h3>Modifier le statut</h3>
            <select id="statusSelect">
                <option value="pending">En attente</option>
                <option value="confirmed">Confirmée</option>
                <option value="shipped">Expédiée</option>
                <option value="delivered">Livrée</option>
                <option value="cancelled">Annulée</option>
            </select>
            <textarea id="notesField" placeholder="Notes..."></textarea>
            <button class="btn btn-primary" onclick="saveOrderChanges()">Enregistrer</button>
            <button class="btn" onclick="closeModal()" style="background: #ddd; margin-left: 10px;">Fermer</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDl7L_kB_AqUJvG2aQTXJ4RRJjAA9U0TaA",
            authDomain: "diamanosn-ea0a1.firebaseapp.com",
            projectId: "diamanosn-ea0a1",
            storageBucket: "diamanosn-ea0a1.appspot.com",
            messagingSenderId: "918076707387",
            appId: "1:918076707387:web:dac8ce0fbc5d90f80f5c05"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentOrderId = null;

        auth.onAuthStateChanged(user => {
            if (!user) window.location.href = '/index.html';
            else loadOrders();
        });

        async function loadOrders() {
            const snap = await db.collection('orders').orderBy('createdAt', 'desc').get();
            let html = '';
            snap.forEach(doc => {
                const order = {id: doc.id, ...doc.data()};
                const date = order.createdAt ? new Date(order.createdAt.seconds * 1000).toLocaleDateString('fr') : '-';
                html += `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id">Commande #${order.id.substring(0, 8)}</div>
                                <div>${order.userEmail} - ${date}</div>
                            </div>
                            <div>
                                <span class="badge badge-${order.status || 'pending'}">${getStatusLabel(order.status)}</span>
                                <button class="btn btn-primary" onclick="editOrder('${order.id}', '${order.status}', '${(order.notes || '').replace(/"/g, '&quot;')}')">✏️ Modifier</button>
                            </div>
                        </div>
                        <div>Total: <strong>${order.totalPrice} FCFA</strong></div>
                        ${order.notes ? `<div>Notes: ${order.notes}</div>` : ''}
                    </div>
                `;
            });
            document.getElementById('ordersContainer').innerHTML = html || '<p>Aucune commande</p>';
        }

        function editOrder(id, status, notes) {
            currentOrderId = id;
            document.getElementById('statusSelect').value = status;
            document.getElementById('notesField').value = notes;
            document.getElementById('orderModal').classList.add('active');
        }

        async function saveOrderChanges() {
            await db.collection('orders').doc(currentOrderId).update({
                status: document.getElementById('statusSelect').value,
                notes: document.getElementById('notesField').value
            });
            closeModal();
            loadOrders();
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function getStatusLabel(status) {
            const labels = {
                'pending': '⏳ En attente',
                'confirmed': '✅ Confirmée',
                'shipped': '📦 Expédiée',
                'delivered': '✓ Livrée',
                'cancelled': '❌ Annulée'
            };
            return labels[status] || status;
        }
    </script>
</body>
</html>
