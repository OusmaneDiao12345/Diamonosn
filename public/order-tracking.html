<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suivi de Commande - DiamanoSN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #0d9488;
      --green2: #115e59;
      --green3: #2dd4bf;
      --orange: #f97316;
      --red: #dc2626;
      --dark: #0f172a;
      --dark2: #1e293b;
      --gray: #64748b;
      --gray2: #94a3b8;
      --gray3: #cbd5e1;
      --gray4: #e2e8f0;
      --gray5: #f8fafc;
      --white: #ffffff;
      --r: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--gray5);
      color: var(--dark);
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gray4);
      color: var(--dark);
      border: none;
      padding: 10px 20px;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 20px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: var(--gray3); }
    .header {
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: white;
      padding: 30px 20px;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    .header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .header-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .header-item { }
    .header-label {
      font-size: 12px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .header-value {
      font-size: 18px;
      font-weight: 700;
    }
    .timeline {
      background: white;
      border: 2px solid var(--gray4);
      border-radius: var(--r);
      padding: 30px;
      margin-bottom: 30px;
    }
    .timeline-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 30px;
      color: var(--dark);
    }
    .timeline-item {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      position: relative;
    }
    .timeline-item:last-child .timeline-line { display: none; }
    .timeline-marker {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--gray4);
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }
    .timeline-item.completed .timeline-marker {
      background: var(--green);
      color: white;
    }
    .timeline-line {
      position: absolute;
      left: 24px;
      top: 50px;
      width: 2px;
      height: calc(100% + 30px);
      background: var(--gray4);
    }
    .timeline-item.completed .timeline-line {
      background: var(--green);
    }
    .timeline-content {
      flex: 1;
      padding-top: 5px;
    }
    .timeline-status {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .timeline-date {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 8px;
    }
    .timeline-note {
      font-size: 14px;
      color: var(--gray2);
    }
    .items-section {
      background: white;
      border: 2px solid var(--gray4);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 30px;
    }
    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--dark);
    }
    .item {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--gray5);
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .item-img {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 8px;
      border: 1px solid var(--gray4);
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }
    .item-info { flex: 1; }
    .item-name {
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .item-details {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 8px;
    }
    .item-price {
      font-weight: 700;
      color: var(--orange);
    }
    .summary-section {
      background: white;
      border: 2px solid var(--gray4);
      border-radius: var(--r);
      padding: 20px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray4);
      font-size: 14px;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { color: var(--gray); }
    .summary-value {
      font-weight: 700;
      color: var(--dark);
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
      border-top: 2px solid var(--gray4);
      font-size: 18px;
      margin-top: 16px;
    }
    .summary-total-label {
      font-weight: 700;
    }
    .summary-total-value {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--orange);
    }
    .loading { text-align: center; padding: 40px; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray3);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) {
      .header-title { font-size: 22px; }
      .header-info { grid-template-columns: 1fr; }
      .timeline { padding: 20px; }
      .item { gap: 12px; }
      .item-img { width: 60px; height: 60px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <button class="back-btn" onclick="window.location.href='my-orders.html'">← Mes Commandes</button>
    <div id="orderTracking"></div>
  </div>

  <script src="https://www.gstatic.com/firebaseapp/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebaseapp/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebaseapp/10.7.1/firebase-firestore.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyABH-6hzANRCGSn7Q-DxZl3kZc34AzB2kQ",
      authDomain: "diamanosn-ea0a1.firebaseapp.com",
      projectId: "diamanosn-ea0a1",
      storageBucket: "diamanosn-ea0a1.appspot.com",
      messagingSenderId: "539088256476",
      appId: "1:539088256476:web:4cf2a2b5cf0eef5197e849"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function fmtPrice(n) {
      return n.toLocaleString('fr-SN', { style: 'currency', currency: 'XOF' }).replace('FCFA', '').trim();
    }

    function getStatusEmoji(status) {
      const emojis = {
        'pending_payment': '⏳',
        'confirmed': '✅',
        'shipped': '🚚',
        'delivered': '📦',
        'cancelled': '❌'
      };
      return emojis[status] || '❓';
    }

    function getStatusLabel(status) {
      const labels = {
        'pending_payment': 'En attente de paiement',
        'confirmed': 'Commande confirmée',
        'shipped': 'En cours de livraison',
        'delivered': 'Livrée',
        'cancelled': 'Annulée'
      };
      return labels[status] || status;
    }

    function buildTimeline(order) {
      const statuses = ['pending_payment', 'confirmed', 'shipped', 'delivered'];
      const currentStatusIndex = statuses.indexOf(order.status);

      return statuses.map((status, index) => {
        const isCompleted = index <= currentStatusIndex && order.status !== 'cancelled';
        const date = order.updatedAt ? new Date(order.updatedAt).toLocaleDateString('fr-FR', {
          day: '2-digit',
          month: 'long',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        }) : 'En attente';

        return `
          <div class="timeline-item ${isCompleted ? 'completed' : ''}">
            <div class="timeline-marker">${getStatusEmoji(status)}</div>
            <div class="timeline-line"></div>
            <div class="timeline-content">
              <div class="timeline-status">${getStatusLabel(status)}</div>
              <div class="timeline-date">${date}</div>
              ${order.notes ? `<div class="timeline-note">📝 ${order.notes}</div>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    async function loadTracking() {
      const container = document.getElementById('orderTracking');
      container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement des détails...</p></div>';

      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('id');

      if (!orderId) {
        container.innerHTML = '<div class="loading"><p>❌ Commande non trouvée</p></div>';
        return;
      }

      auth.onAuthStateChanged(async (user) => {
        if (!user) {
          container.innerHTML = '<div class="loading"><p>🔐 Connexion requise</p></div>';
          return;
        }

        try {
          const response = await fetch(`https://diamonobackend.onrender.com/api/orders/${orderId}`, {
            headers: { 'Authorization': `Bearer ${await user.getIdToken()}` }
          });
          const { order } = await response.json();

          if (!order) {
            container.innerHTML = '<div class="loading"><p>❌ Commande non trouvée</p></div>';
            return;
          }

          const createdDate = new Date(order.createdAt).toLocaleDateString('fr-FR', {
            day: '2-digit',
            month: 'long',
            year: 'numeric'
          });

          const subtotal = order.items.reduce((s, i) => s + (i.price * (i.quantity || 1)), 0);
          const commission = Math.round(subtotal * 0.05);
          const livraison = subtotal >= 100000 ? 0 : 2000;
          const total = subtotal + commission + livraison;

          container.innerHTML = `
            <div class="header">
              <div class="header-title">${order.orderRef}</div>
              <div class="header-info">
                <div class="header-item">
                  <div class="header-label">Statut</div>
                  <div class="header-value">${getStatusEmoji(order.status)} ${getStatusLabel(order.status)}</div>
                </div>
                <div class="header-item">
                  <div class="header-label">Date</div>
                  <div class="header-value">${createdDate}</div>
                </div>
                <div class="header-item">
                  <div class="header-label">Montant</div>
                  <div class="header-value">${fmtPrice(total)}</div>
                </div>
              </div>
            </div>

            <div class="timeline">
              <div class="timeline-title">📍 Suivi de la commande</div>
              ${buildTimeline(order)}
            </div>

            <div class="items-section">
              <div class="section-title">📦 Articles commandés</div>
              ${order.items.map(item => `
                <div class="item">
                  <div class="item-img" style="background-image: url('${item.image || ''}')"></div>
                  <div class="item-info">
                    <div class="item-name">${item.name}</div>
                    <div class="item-details">
                      Quantité: <strong>${item.quantity || 1}</strong> × ${fmtPrice(item.price)}
                    </div>
                    <div class="item-price">${fmtPrice(item.price * (item.quantity || 1))}</div>
                  </div>
                </div>
              `).join('')}
            </div>

            <div class="summary-section">
              <div class="section-title">💰 Résumé du paiement</div>
              <div class="summary-row">
                <span class="summary-label">Sous-total</span>
                <span class="summary-value">${fmtPrice(subtotal)}</span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Commission DiamanoSN (5%)</span>
                <span class="summary-value">${fmtPrice(commission)}</span>
              </div>
              <div class="summary-row">
                <span class="summary-label">Livraison</span>
                <span class="summary-value">${livraison === 0 ? '✅ GRATUITE' : fmtPrice(livraison)}</span>
              </div>
              <div class="summary-total">
                <span class="summary-total-label">Total</span>
                <span class="summary-total-value">${fmtPrice(total)}</span>
              </div>
            </div>`;
        } catch (error) {
          console.error('Erreur:', error);
          container.innerHTML = '<div class="loading"><p>⚠️ Erreur de chargement</p></div>';
        }
      });
    }

    loadTracking();
  </script>
</body>
</html>
